<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Product</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 20px; background-color: #f5f7fa; max-width: 500px; margin: auto; }
        .container { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .form-group { display: flex; flex-direction: column; margin-bottom: 20px; }
        label { margin-bottom: 8px; font-weight: 700; color: #555; font-size: 14px; }
        input { padding: 14px; border: 1px solid #eee; border-radius: 10px; font-size: 16px; outline: none; }
        input:focus { border-color: #3498db; }
        button { padding: 16px; background: #3498db; color: white; border: none; border-radius: 10px; cursor: pointer; font-size: 16px; font-weight: 700; width: 100%; transition: 0.2s; }
        button:hover { background: #2980b9; }
        .back-link { display: block; margin-bottom: 25px; color: #95a5a6; text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>
    <a href="/admin" class="back-link">← Back to Admin</a>
    <div class="container">
        <h2 style="margin-top:0;">Edit Product</h2>
        <form action="/edit_item/{{ item._id }}" method="POST">
            <div class="form-group"><label>Product Name</label><input type="text" name="item" value="{{ item.item }}" required></div>
            <div class="form-group"><label>Category</label><input type="text" name="category" value="{{ item.category }}" required></div>
            <div class="form-group"><label>Pack Size</label><input type="text" name="size" value="{{ item.size }}" required></div>
            <div class="form-group"><label>Price (₹)</label><input type="number" step="0.01" name="price" value="{{ item.price }}" required></div>
            <div class="form-group"><label>Stock</label><input type="number" name="stock" value="{{ item.stock }}" required></div>
            <button type="submit">Update Product</button>
        </form>
    </div>
</body>
</html>
